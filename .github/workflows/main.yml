name: Build and Deploy CVs

on:
  push:
    branches: [main]
  workflow_dispatch: {}  

jobs:
  build-es:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install RenderCV
        run: pip install "rendercv[full]"

      - name: Render Spanish CV
        run: rendercv render CV_es.yaml

      - name: Upload Spanish PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv-es
          path: rendercv_output/*.pdf
          retention-days: 14

  build-en:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install RenderCV
        run: pip install "rendercv[full]"

      - name: Render English CV
        run: rendercv render CV_en.yaml

      - name: Upload English PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv-en
          path: rendercv_output/*.pdf
          retention-days: 14

  deploy:
    needs: [build-es, build-en]
    runs-on: ubuntu-latest
    steps:
      - name: Download Spanish PDF
        uses: actions/download-artifact@v4
        with:
          name: cv-es
          path: rendercv_output

      - name: Download English PDF
        uses: actions/download-artifact@v4
        with:
          name: cv-en
          path: rendercv_output

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/config <<EOF
          Host deploy
              HostName ssh.franucles.com
              IdentityFile ~/.ssh/portfolio-deploy
              User portfolio-deploy
              StrictHostKeyChecking no
              ProxyCommand cloudflared access ssh --hostname %h
          EOF
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/portfolio-deploy
          chmod 600 ~/.ssh/portfolio-deploy
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
      - name: Deploy
        env:
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.TUNNEL_SERVICE_TOKEN_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.TUNNEL_SERVICE_TOKEN_SECRET }}
        run: |
          rsync -az --delete rendercv_output/ deploy:~/web/cv/
